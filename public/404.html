<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect: encode the current path as a query param and redirect to index.html
      // pathSegmentsToKeep=1 preserves the /repo-name/ prefix for GitHub Pages project sites
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
